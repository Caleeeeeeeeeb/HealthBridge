{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password - HealthBridge</title>
    <style>
        :root {
            --emerald-green: #2ECC71;
            --deep-blue: #2980B9;
            --gold: #FFD700;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            overflow: hidden;
            background: url("{% static 'healthbridge_app/background.png' %}") center/cover no-repeat;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(6px);
            z-index: 0;
        }

        .forgot-container {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 16px;
            padding: 40px 30px;
            width: 340px;
            text-align: center;
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            color: #fff;
        }

        p {
            font-size: 14px;
            color: #e6e6e6;
            margin-bottom: 25px;
        }

        input[type="email"] {
            width: 90%;
            padding: 10px 12px;
            border-radius: 8px;
            border: none;
            outline: none;
            font-size: 14px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
        }

        input[type="email"]:focus {
            box-shadow: 0 0 6px rgba(46, 204, 113, 0.6);
        }

        button {
            width: 70%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--deep-blue), var(--emerald-green));
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, var(--emerald-green), var(--deep-blue));
        }

        .back-link {
            display: block;
            margin-top: 18px;
            color: var(--gold);
            font-weight: bold;
            text-decoration: none;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: #fff;
        }

        /* Modal styling */
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.5);
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .modal.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px 40px;
            border-radius: 16px;
            text-align: center;
            color: #333;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
            animation: pop 0.3s ease;
        }

        .modal-content h2 {
            margin-bottom: 10px;
            color: var(--deep-blue);
        }

        .modal-content p {
            margin-bottom: 20px;
            font-size: 14px;
            color: #444;
        }

        .modal-content button {
            background: linear-gradient(135deg, var(--emerald-green), var(--deep-blue));
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 8px 20px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .modal-content button:hover {
            transform: scale(1.05);
        }

        @keyframes pop {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>

<body>
    <div class="overlay"></div>

    <div class="forgot-container">
        <h1>Forgot Password?</h1>
        <p>Enter your registered email and we'll send you<br>instructions to reset your password.</p>
        <form id="resetForm" method="post">
            {% csrf_token %}
            <input type="email" name="email" placeholder="Enter your email" required>
            <br>
            <button type="submit">Send Reset Link</button>
        </form>
        <a href="{% url 'login' %}" class="back-link">Back to Login</a>
    </div>

    <!-- Success Modal -->
    <div class="modal" id="successModal">
        <div class="modal-content">
            <h2>✅ Reset Link Sent!</h2>
            <p>Please check your email for instructions to reset your password.</p>
            <button onclick="closeModal()">OK</button>
        </div>
    </div>

    <script>
        const form = document.getElementById("resetForm");
        const modal = document.getElementById("successModal");

        form.addEventListener("submit", function(e) {
            e.preventDefault(); // Prevent form reload
            modal.classList.add("active");
        });

        function closeModal() {
            modal.classList.remove("active");
        }
    </script>
</body>
</html>
